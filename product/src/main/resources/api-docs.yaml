openapi: 3.1.0
info:
  title: Product API
  description: API for managing products in the e-commerce application
  contact:
    name: Development Team
    email: dev@example.com
  version: "1.0"
servers:
- url: http://localhost:8080
  description: Generated server url
tags:
- name: Product Management API
  description: CRUD operations for product management
paths:
  /api/products/update:
    put:
      tags:
      - Product Management API
      operationId: updateProduct
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseDtoProductDto"
  /api/product/create:
    post:
      tags:
      - Product Management API
      summary: Create a new product
      description: Creates a new product with the provided details
      operationId: createProduct
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductDto"
        required: true
      responses:
        "200":
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
  /api/products/get/{id}:
    get:
      tags:
      - Product Management API
      operationId: getProduct
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
          pattern: "^[0-9]+$"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseDtoProductDto"
  /api/product/delete/{id}:
    delete:
      tags:
      - Product Management API
      operationId: deleteProduct
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
          pattern: "^[0-9]+$"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseDto"
components:
  schemas:
    ProductDto:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
          maxLength: 50
          minLength: 2
        description:
          type: string
          format: text
        price:
          type: number
          format: float
          minimum: 0
      required:
      - description
      - price
    ResponseDtoProductDto:
      type: object
      properties:
        status:
          type: string
        msg:
          type: string
        data:
          $ref: "#/components/schemas/ProductDto"
    ResponseDto:
      type: object
      properties:
        status:
          type: string
        msg:
          type: string
        data: {}
    ErrorResponseDto:
      type: object
      properties:
        status:
          type: string
        errorCode:
          type: integer
          format: int32
        errorMessage:
          type: string
        apiPath:
          type: string
        time:
          type: string
          format: date-time
